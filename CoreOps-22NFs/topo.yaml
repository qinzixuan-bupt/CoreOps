name: hn-5gc-bench

mgmt:
  network: hn-5gc-bench-net
  ipv4-subnet: 10.100.200.0/24

topology:
  nodes:
    # ── 基础设施 ──
    prometheus:
      kind: linux
      image: prom/prometheus:latest
      mgmt-ipv4: 10.100.200.2
      binds: 
        - "./config/prometheus.yml:/etc/prometheus/prometheus.yml"
        - "/etc/localtime:/etc/localtime:ro"
      ports:
        - "9091:9090"

    # ── 核心注册与数据层 (10.100.200.10 - 19) ──
    nrf:
      kind: linux
      image: my-pure-open5gs:v1
      mgmt-ipv4: 10.100.200.10
      binds: ["./config/nrf.yaml:/etc/open5gs/nrf.yaml", "/etc/localtime:/etc/localtime:ro"]
      cmd: bash -c "export OGS_LOG_NO_COLOR=1 && open5gs-nrfd"

    nssf:
      kind: linux
      image: my-pure-open5gs:v1
      mgmt-ipv4: 10.100.200.11
      binds: ["./config/nssf.yaml:/etc/open5gs/nssf.yaml", "/etc/localtime:/etc/localtime:ro"]
      cmd: bash -c "export OGS_LOG_NO_COLOR=1 && open5gs-nssfd"

    nef:
      kind: linux
      image: my-pure-open5gs:v1
      mgmt-ipv4: 10.100.200.12
      binds: ["./config/bsf.yaml:/etc/open5gs/nef.yaml", "/etc/localtime:/etc/localtime:ro"] # 注意：这里你原文件映射的是bsf.yaml，如果是笔误请修改
      cmd: bash -c "export OGS_LOG_NO_COLOR=1 && open5gs-bsfd"

    udr:
      kind: linux
      image: my-pure-open5gs:v1
      mgmt-ipv4: 10.100.200.13
      binds: ["./config/udr.yaml:/etc/open5gs/udr.yaml", "/etc/localtime:/etc/localtime:ro"]
